<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaspa Statement</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <div class="header">
      <div class="logo">𐤊</div>
      <h1>Kaspa Statement</h1>
      <p class="subtitle">A receipt for every transaction. A statement for your wallet.</p>
    </div>

    <div class="input-section">
      <div class="input-group">
        <input type="text" id="tx-input" placeholder="Paste a transaction ID or wallet address..." maxlength="80" spellcheck="false" autocomplete="off" aria-label="Transaction ID or wallet address">
        <button id="generate-btn">Generate</button>
      </div>
    </div>

    <div id="skeleton" class="skeleton-card">
      <div class="sk-section">
        <div class="sk-block" style="width:40%;height:18px;margin:0 auto 4px;"></div>
      </div>
      <div class="sk-separator"></div>
      <div class="sk-section">
        <div class="sk-block" style="width:25%;height:22px;margin:0 auto 16px;"></div>
        <div class="sk-block" style="width:100%;height:13px;"></div>
      </div>
      <div class="sk-separator"></div>
      <div class="sk-section">
        <div class="sk-block" style="width:12%;height:11px;margin-bottom:8px;"></div>
        <div class="sk-row">
          <div class="sk-block" style="width:65%;height:13px;"></div>
          <div class="sk-block" style="width:36px;height:20px;border-radius:6px;"></div>
        </div>
      </div>
      <div class="sk-separator"></div>
      <div class="sk-section">
        <div class="sk-block" style="width:8%;height:11px;margin-bottom:8px;"></div>
        <div class="sk-row" style="margin-bottom:6px;">
          <div class="sk-block" style="width:55%;height:13px;"></div>
          <div class="sk-block" style="width:18%;height:13px;"></div>
        </div>
        <div class="sk-row">
          <div class="sk-block" style="width:50%;height:13px;"></div>
          <div class="sk-block" style="width:14%;height:13px;"></div>
        </div>
      </div>
      <div class="sk-separator"></div>
      <div class="sk-section">
        <div class="sk-row">
          <div class="sk-block" style="width:15%;height:18px;"></div>
          <div style="text-align:right;">
            <div class="sk-block" style="width:100px;height:20px;margin-bottom:3px;margin-left:auto;"></div>
            <div class="sk-block" style="width:60px;height:12px;margin-left:auto;"></div>
          </div>
        </div>
      </div>
      <div class="sk-separator"></div>
      <div class="sk-section">
        <div class="sk-block" style="width:25%;height:10px;margin:0 auto 4px;"></div>
        <div class="sk-row" style="justify-content:center;">
          <div class="sk-block" style="width:35%;height:11px;"></div>
          <div class="sk-block" style="width:36px;height:20px;border-radius:6px;"></div>
        </div>
      </div>
    </div>

    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <p id="loading-text">Looking up your transaction…</p>
      <div class="progress-bar-container hidden" id="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
    </div>

    <div id="error" class="error hidden" role="alert"></div>

    <div id="actions-bar" class="actions-bar hidden">
      <button class="btn-export" id="export-csv-btn">Export</button>
    </div>

    <div id="result" class="hidden">
      <div class="receipt-card" id="receipt-card"></div>
      <div id="statement-card" class="hidden"></div>
    </div>


  </main>
  <script src="app.js"></script>
</body>
</html>
